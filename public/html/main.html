<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>iiko-like</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/main.css">

</head>
<body>


  <header class="header">
    <div class="logo">iiko-like</div>
    <button id="closeShiftBtn">Закрыть смену(временно)</button>
    <button id="logoutBtn">Выйти</button>
  </header>

  <div class="layout">

    <aside class="sidebar">
      <div class="user-info">
        <div id="userName"></div>
        <div id="userRole"></div>
      </div>


      <div class="staff-list">
 
      </div>
    </aside>

    <main class="content">
      <div class="tables">
        <!-- 12 столов -->
        <div class="table-cell" data-id="1">1</div>
        <div class="table-cell" data-id="2">2</div>
        <div class="table-cell" data-id="3">3</div>
        <div class="table-cell" data-id="4">4</div>
        <div class="table-cell" data-id="5">5</div>
        <div class="table-cell" data-id="6">6</div>
        <div class="table-cell" data-id="7">7</div>
        <div class="table-cell" data-id="8">8</div>
        <div class="table-cell" data-id="9">9</div>
        <div class="table-cell" data-id="10">10</div>
        <div class="table-cell" data-id="11">11</div>
        <div class="table-cell" data-id="12">12</div>
      </div>
    </main>

  </div>

  <button id="createTableBtn">Создать стол</button>
  <script src="/js/main.js" defer></script>

</body>
</html>
