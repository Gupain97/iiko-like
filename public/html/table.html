<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="stylesheet" href="/css/table.css" />
  <link rel="stylesheet" href="/css/header.css" />
  <meta charset="UTF-8" />
  <title>Стол</title>
</head>
<body>

<div id="header-container"></div>
<div class = "layout">
  <div class="table-container">

    <div class="table-header">
      <h1>Стол № <span id="tableNumber"></span></h1>
      <h3>Официант: <span id="waiterName"></span></h3>
    </div>

    <div class="items">
      <table class="items-table">
        <thead>
          <tr>
            <th>Наименование</th>
            <th>Кол-во</th>
            <th>Цена</th>
            <th>Сумма</th>
            <th>Время</th>
        </tr>
        </thead>
        <tbody id="itemsList">
        <!-- Сюда будут добавляться строки -->
      </tbody>
    </table>
    </div>
    <div id="orderTotal"></div>
    <div class="act-quantity">
      <div class="btn-increment">+</div>
      <div class="btn-decrement">-</div>
      <div class="btn-quantity">123</div>
      <div class="btn-delete">×</div>
    </div>


    <div class="actions">
    <!--  <button id="addItemBtn" class="btn-add">Добавить позицию</button>-->
      <button id="printOrderBtn" class="btn-print">Печать</button>
      <button id="precheckOrder" class="btn-close">Пречек</button>
      <button id="closeTableBtn" class="btn-close">Закрыть стол</button>
      <button id="openTableBtn" class='btn-add'>Открыть стол</button>
      <button id="cancelPrecheckBtn" class='btn-cancp'>Отмена пречека</button>

      <button id="exitTableBtn" class="btn-exit">Назад</button>
    </div>

  </div>

  <div class="menu-container">
    <div id="categories"></div>
    <div id="menuItems"></div>
  </div>

    <script src="/js/header.js"></script>
    <script src="/js/table.js"></script>
</div>
</body>
</html>
